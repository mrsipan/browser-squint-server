        const ws = new WebSocket('ws://127.0.0.1:9001');


import { compileString } from 'https://unpkg.com/squint-cljs/index.js';

ws.onmessage = async (e) => {
    const { code, id, session } = JSON.parse(e.data);

    try {
        // 1. Compile Squint -> JS
        let jsCode = compileString(code, {
            core_module: 'https://unpkg.com/squint-cljs/core.js'
        });

        // 2. Fix the Library Path Error
        // Replaces "squint-cljs/src/..." with full CDN URLs
        jsCode = jsCode.replace(/"squint-cljs\/src\/squint\/(.+?)\.js"/g,
            '"https://unpkg.com/squint-cljs/src/squint/$1.js"');

        // 3. The Persistence & Result Hack
        // We look for 'export const/function foo' and change to 'window.foo'
        // We also wrap the last expression to capture the value
        jsCode = jsCode.replace(/^export (const|var|let|function) (\w+)/gm, 'window.$2');

        // Wrap the whole thing in a self-executing async block to capture the last value
        // Note: This is a simplified result capture.
        const wrappedCode = `
            try {
                ${jsCode}
                // If the last line is an expression, Squint generates it as a statement.
                // For a true REPL, you'd parse the AST, but let's assume we want 'Success'
                // unless we explicitly set a global result.
            } catch (e) {
                window._repl_err = e;
            }
        `;

        const blob = new Blob([wrappedCode], { type: 'text/javascript' });
        const url = URL.createObjectURL(blob);

        await import(url);
        URL.revokeObjectURL(url);

        // Check if there's an error from the internal execution
        if (window._repl_err) {
            const err = window._repl_err;
            window._repl_err = null;
            throw err;
        }

        ws.send(JSON.stringify({
            value: "Success", // Standard nREPL value
            id: id,
            session: session
        }));

    } catch (err) {
        ws.send(JSON.stringify({ value: `Browser Error: ${err.message}`, id, session }));
    }
};
