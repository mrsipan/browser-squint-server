<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Squint REPL</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
        h1 { color: #569cd6; border-bottom: 1px solid #333; padding-bottom: 10px;}
        #log { background: #2d2d2d; padding: 15px; min-height: 300px; border-radius: 5px; white-space: pre-wrap;}
        .highlight { color: #ce9178; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "squint-cljs/": "https://unpkg.com/squint-cljs/"
        }
      }
    </script>
</head>
<body>
    <h1 id="status">Connecting to Bridge...</h1>
    <div id="log">Waiting for commands from REST API...</div>

    <script type="module">
        import { compileString } from 'https://unpkg.com/squint-cljs/index.js';
        import * as core from 'https://unpkg.com/squint-cljs/core.js';

        window.squint_core = core; // Expose Squint core
        const uiLog = document.getElementById('log');

        // Connect to the Python bridge
        const ws = new WebSocket(`ws://127.0.0.1:5757${window.location.search}`);

        // Setup AsyncFunction for top-level await support in evaluated code
        const AsyncFunction = Object.getPrototypeOf(async function(){}).constructor;

        // Buffers for standard output and error
        let currentStdOut = "";
        let currentStdErr = "";

        const origLog = console.log;
        const origErr = console.error;

        // Intercept console outputs during evaluation
        console.log = (...args) => {
            currentStdOut += args.join(" ") + "\n";
            origLog(...args);
        };
        console.error = (...args) => {
            currentStdErr += args.join(" ") + "\n";
            origErr(...args);
        };

        ws.onopen = () => { document.getElementById('status').innerText = "REPL Ready (Connected)"; };
        ws.onclose = () => { document.getElementById('status').innerText = "Disconnected from Bridge"; };

        ws.onmessage = async (e) => {
            let reqId = null;

            // Reset buffers for this execution
            currentStdOut = "";
            currentStdErr = "";

            try {
                const parsed = JSON.parse(e.data);

                // 1. Ignore Heartbeats
                if (parsed.type === "heartbeat") return;

                reqId = parsed.id;
                const code = parsed.code;
                if (!code) return;

                uiLog.innerHTML = `Evaluating via Bridge ID [${reqId}]:\n<span class="highlight">${code}</span>\n\n`;

                // 2. Compile CLJS to JS
                let jsCode = compileString(code, {
                    context: 'return',
                    repl: true,
                    core_module: 'squint_core'
                });

                // 3. Evaluate the JavaScript
                const runner = new AsyncFunction(jsCode);
                const result = await runner();

                // 4. Serialize safely
                let serializedValue = "nil";
                if (result !== undefined && result !== null) {
                    try {
                        serializedValue = typeof result === 'object' ? JSON.stringify(result) : String(result);
                    } catch (serErr) {
                        serializedValue = `[Unserializable: ${typeof result}]`;
                    }
                }

                // 5. Send Success Response to Bridge
                ws.send(JSON.stringify({
                    id: reqId,
                    value: serializedValue,
                    out: currentStdOut,
                    err: currentStdErr,
                    ex: null
                }));

                uiLog.innerHTML += `Result: ${serializedValue}`;

            } catch (err) {
                origErr("REPL ERROR:", err);

                // 6. Send Error Response to Bridge
                if (ws.readyState === WebSocket.OPEN && reqId) {
                    ws.send(JSON.stringify({
                        id: reqId,
                        value: null,
                        out: currentStdOut,
                        err: currentStdErr,
                        ex: err.stack || err.message || String(err)
                    }));
                }
            }
        };
    </script>
</body>
</html>
